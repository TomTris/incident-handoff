
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Incident List</title>
        <link rel="stylesheet" href="incidents.css">
    </head>
    <body>
        <h1 id="title">Incidents</h1>
        <form id="add-incident-form">
            <legend>Create Incident</legend>
            <label>
                Title
                <input id="incident-title" type="text" required>
            </label>
            <label>
                Service
                <input id="incident-service" type="text" required>
            </label>
            <label>
                Severity
                <input id="incident-severity" type="text" required>
            </label>
            <div id="error-message" style="display: none; color: red;"></div>
            <button type="submit">Create Incident</button>
        </form>
        <ul id="incident-list">
        </ul>
        <button id="logout-btn" >logout</button>
    </body>
    <script type="module" src="/dist/incident-list.js"></script>
</html>
